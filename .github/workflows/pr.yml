name: PR Quality Gates

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  api_quality:
    name: API Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Ruff (API)
        run: ruff check api

      - name: Pytest with coverage (API, >=85%)
        run: |
          cd api
          pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  worker_quality:
    name: Worker Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Worker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt

      - name: Ruff (Worker)
        run: ruff check worker

      - name: Pytest with coverage (Worker, >=85%)
        run: |
          cd worker
          pytest --cov=. --cov-report=term-missing --cov-fail-under=85

  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build API image
        run: docker build -f api/Dockerfile -t imageresizer-pro-api:pr-${{ github.sha }} api

      - name: Build Worker image
        run: docker build -f worker/Dockerfile -t imageresizer-pro-worker:pr-${{ github.sha }} worker

  terraform_validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: infra

      - name: Terraform validate
        run: terraform validate
        working-directory: infra

  compose_smoke:
    name: Compose Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compose up
        run: docker compose up -d --build

      - name: Wait for API and probe endpoints
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/healthz; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/healthz
          curl -fS -o /dev/null -w "%{http_code}\n" http://localhost:8000/readyz | grep -E "^200$"

      - name: Compose down
        if: always()
        run: docker compose down -v
